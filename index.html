<html>
    <head>
        <style>
            div{
                display: flex;
                justify-content: space-between;
            }
            img{
                width: 300px;
                height: 300px;
                margin: 0 10px 0 0;
            }
        </style>
    </head>
    <body>
<h2>Read More Read Less Button</h2>
<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Phasellus imperdiet, nulla et dictum interdum, nisi lorem egestas vitae scel<span id="dots"></span><div id="more">
 <div>
   <div>
    <img src="adf.jpg">
    <a onclick="myFunction()" id="myBtn">Read more</a>
   </div> 
   <div>
   <img src="as.jpg"> 
    <a onclick="myFunction()" id="myBtn">Read more</a>  
   </div> 
   <div>
    <img src="asl.png">    
    <a onclick="myFunction()" id="myBtn">Read more</a>
   </div> 
 </div>
</div></p>

<script>
function myFunction() {
  var dots = document.getElementById("dots");
  var btnText = document.getElementById("myBtn");

  if (dots.style.display === "none") {
    dots.style.display = "inline";
    btnText.innerHTML = "Read more"; 
  } else {
    dots.style.display = "none";
    btnText.innerHTML = "Read less"; 
  }
}
</script>
    </body>
</html>
